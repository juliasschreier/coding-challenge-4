<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvasbelowtheconcrete.mta</title>
    <style>
    body{
        background-color: black;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
        padding: 30px;
        margin: 0px;
    
    }

    a{
        color: white;
    }
    
    hr{
        position: absolute;
        width: 3500px;
        height: 5px;
        margin-top: 99px;
        margin-left: -40px;
        color: white;
        background-color: white;
    }
    h1{
        position: absolute;
        margin-top: 100px;
        margin-left: 50px;
        font-family: Arial, Helvetica, sans-serif;
        font-weight: bold;
        color: white;
        font-size: 95px;
    }
    
    .exit img{
        position: absolute;
        width: 260px;
        margin-left: 1150px;
        margin-top: -30px;
    }
    
    
    #captureArea {
        display: inline-block;
        text-align: left;
        background: black; /* matches your drawing background */
        color: white;
        padding: 10px;
        margin-top: 29px;
      }
      
      #captureArea hr {
        border: 1px solid white;
        width: 51%;
        margin-top: 60px;
        margin-left: 0px;
      }
      
      #captureArea h1 {
        margin-top: -30px 0;
        font-family: sans-serif;
        color: white;
      }
      
      #captureArea canvas {
        display: block;
        margin-top: -40px;
        box-shadow: 0 0 10px rgba(56, 56, 56);
        border-radius: 1px;
    
      }
      
    canvas{
        cursor: pointer;
        background-color: black;
        display: block;
        margin-top: 0px;
    
    }
    
    
    .tools{
        margin-top: -580px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 15px;
        margin-right: 260px;
    }
    
    .color-and-range {
    display: flex;
    align-items: center; /* centers the colors vertically with the slider */
    justify-content: flex-end;
    gap: 20px; /* adds space between colors and pen-range */
    margin-right: 60px;
}
    
    .colors {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 4 colors per row */
    gap: 15px;
    justify-items: center;
    align-items: center;
    margin-top: 90px;
}
    
    .tools .color-field{
        height: 80px;
        width: 80px;
        cursor: pointer;
        border: 2px solid ;
        margin: 0 10px;
        border-radius: 50%;
    
    }
    
    .tools .button {
        align-self: center;
        width: 150px;
        height: 70px;
        border: 2px solid white;
        cursor: pointer;
        color: white;
        background: black;
        font-weight: bold;
        margin: 10px;
        font-size: 40px;
    }   
    
    .pen-range{
        writing-mode: bt-lr;
        -webkit-appearance: slider-vertical;
        appearance: slider-vertical;
        margin-top: 200px;
        width: 30px;
        height: 180px;
        cursor: pointer;
        align-self: left;
    }
    
    /* Track - Chrome, Safari, Edge */
    .pen-range::-webkit-slider-runnable-track {
        width: 20px;
        height: 180%;
        background: rgb(97, 97, 97); /* track color */
        border-radius: 10px;
      }
      
      /* Thumb - Chrome, Safari, Edge */
      .pen-range::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        background: red; /* thumb color */
        border-radius: 50%;
        margin-left: 0px;
        cursor: grab;
        margin-top: 0px; /* center thumb on track */
      }
    
    
    .color-options{
        display: flex;
        flex-direction: row;
        gap: 10px;
        justify-content: left;
    
    }
    
    #saveScreenshot{
        width: 325px;
        height: 70px;
        border: 2px solid white;
        cursor: pointer;
        color: white;
        background: black;
        font-weight: bold;
        font-size: 40px;
        margin-top: 10px;
        margin-left: 10px;
    
    }
    
    
    
    </style>
</head>
<body>
    <a href="index.html">
    <div class="exit"><img src="exit.jpg"></div>
</a>
<div class="back">
    <hr>
</div>
    <div id="captureArea">
        <hr>
        <h1>42 St<br>Times Square</h1>
        <canvas id="canvas"></canvas>
    </div>
        <div class="tools">
            <div class="color-and-range">
                <div class="colors">
                    <div onClick="change_color(this)" class="color-field" style="background: rgb(0, 96, 182);"></div>
                    <div onClick="change_color(this)" class="color-field" style="background: rgb(255, 0, 0);"></div>
                    <div onClick="change_color(this)" class="color-field" style="background: rgb(255, 221, 0);"></div>
                    <div onClick="change_color(this)" class="color-field" style="background: rgb(186, 13, 180);"></div>
                    <div onClick="change_color(this)" class="color-field" style="background: grey;"></div>
                    <div onClick="change_color(this)" class="color-field" style="background: white;"></div>
                </div>
            
                <input type="range" min="1" max="100" class="pen-range"
                onInput ="draw_width = this.value">

            </div>
               

            <div class="button-section">
                <button onClick="undo_last()" type="button" class="button">UNDO</button>
                <button onClick="clear_canvas()" type="button" class="button">CLEAR</button>
                <br>
                <button id="saveScreenshot">SAVE</button>
            </div>
    </div>

    <script src="1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
